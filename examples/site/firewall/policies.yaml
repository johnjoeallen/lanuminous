policies:
  - name: lab-anywhere
    action: accept
    source_zone: lab
    destination_zone: wan
    allowed_services: [any]
    description: Trusted lab clients can access the internet.
  - name: rivia-home-internet
    action: accept
    source_zone: rivia-home
    destination_zone: wan
    allowed_services: [dns, http, https]
    description: Wi-Fi clients can access the internet.
  - name: rivia-iot-jellyfin
    action: accept
    source_zone: rivia-iot
    destination_zone: rivia-home
    allowed_services: [http, https]
    destination_hosts: [jellyfin]
    description: IoT devices may reach Jellyfin only.
  - name: rivia-iot-internet
    action: accept
    source_zone: rivia-iot
    destination_zone: wan
    allowed_services: [dns, http, https]
    description: IoT devices can access WAN services such as streaming platforms.
  - name: rivia-guest-internet
    action: accept
    source_zone: rivia-guest
    destination_zone: wan
    allowed_services: [dns, http, https]
    description: Guests can access the internet only.
