controller: manual
expose_all_ssids_on_all_aps: true
ssids:
  - name: rivia-home
    vlan: 10
    zone: rivia-home
    broadcast_groups:
      - indoor
  - name: rivia-iot
    vlan: 20
    zone: rivia-iot
    broadcast_groups:
      - indoor
  - name: rivia-guest
    vlan: 30
    zone: rivia-guest
    broadcast_groups:
      - indoor
  - name: labwifi
    vlan: 40
    zone: labwifi
    broadcast_groups:
      - indoor
