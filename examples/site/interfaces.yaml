interfaces:
  - logical_name: wan
    name: enp1s0
    role: wan
    kind: physical
    addresses:
      - dhcp
  - logical_name: lan
    name: enp2s0
    role: lan
    kind: physical
    addresses:
      - 10.0.0.1/24
    network_refs:
      - lab
  - logical_name: wifi
    name: enp3s0
    role: wifi_uplink
    kind: physical
    addresses:
      - 10.0.10.1/24
    network_refs:
      - rivia-home
      - rivia-iot
      - rivia-guest
      - rivia-lab
    vlan_tags:
      - 10
      - 20
      - 30
      - 40
